global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: pg-loadgen
    # Docker Compose's embedded DNS returns one A record per running replica of
    # the `loadgen` service, so this discovers every replica automatically —
    # no hardcoded container names, and it survives `--scale loadgen=N`.
    dns_sd_configs:
      - names: ['loadgen']
        type: A
        port: 9090

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
