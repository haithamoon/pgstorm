apiVersion: v1
kind: ConfigMap
metadata:
  name: pgstorm-config
data:
  WORKERS: "20"
  CREATE_INDEXES: "false"
  RING_SIZE: "10000"
  WRITE_PCT: "35"
  READ_SIMPLE_PCT: "15"
  READ_JOIN_PCT: "20"
  UPDATE_PCT: "15"
  DELETE_PCT: "10"
  READ_IP_PCT: "5"
  MIN_PAYLOAD_KB: "8"
  MAX_PAYLOAD_KB: "16"
  DELETE_BATCH_SIZE: "50"
  THINK_TIME_MS: "0"
  METRICS_PORT: "9090"
  RUN_DURATION_SECS: "0"
  SUMMARY_INTERVAL_SECS: "30"
  INDEX_STATS_INTERVAL_SECS: "30"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgstorm
  labels:
    app: pgstorm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pgstorm
  template:
    metadata:
      labels:
        app: pgstorm
    spec:
      containers:
        - name: pgstorm
          image: your-registry/pgstorm:latest
          ports:
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: pgstorm-config
            - secretRef:
                name: pgstorm-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "512Mi"
