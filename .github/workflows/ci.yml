name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Deps are vendored (committed vendor/), so builds/tests run offline.
  GOFLAGS: -mod=vendor

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  integration:
    name: integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: loadgen
          POSTGRES_PASSWORD: loadgen
          POSTGRES_DB: loadtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_DSN: postgres://loadgen:loadgen@127.0.0.1:5432/loadtest?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -tags integration ./db/...
